<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>eturkey.ru — Детали объекта</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--gold:#C9A84C;--gold2:#F0D080;--dark:#0A0C10;--dark2:#12151C;--dark3:#1A1F2B;--light:#F8F4EE}
body{background:var(--dark);color:var(--light);font-family:'Segoe UI',system-ui,sans-serif}

.nav{position:sticky;top:0;z-index:200;padding:14px 40px;display:flex;align-items:center;justify-content:space-between;background:rgba(10,12,16,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(201,168,76,0.15)}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-box{width:34px;height:34px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#000}
.logo-text{font-size:17px;font-weight:600;color:var(--light)}
.logo-text span{color:var(--gold)}
.nav-links{display:flex;gap:28px;list-style:none}
.nav-links a{color:rgba(248,244,238,0.65);text-decoration:none;font-size:13.5px}
.nav-btn{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;padding:9px 22px;border-radius:6px;font-size:13px;font-weight:700;border:none;cursor:pointer}

.det-back{display:inline-flex;align-items:center;gap:8px;color:rgba(248,244,238,.55);font-size:13.5px;cursor:pointer;text-decoration:none;padding:20px 40px 0}
.det-back:hover{color:var(--gold)}
.det-wrap{max-width:1100px;margin:0 auto;padding:28px 40px 60px}
.det-gallery{display:grid;grid-template-columns:2fr 1fr;gap:12px;height:420px;margin-bottom:36px;border-radius:16px;overflow:hidden}
.det-main-img{height:100%;overflow:hidden;background:var(--dark2)}
.det-main-img img{width:100%;height:100%;object-fit:cover}
.det-thumbs{display:flex;flex-direction:column;gap:12px}
.det-thumb{flex:1;overflow:hidden;background:var(--dark2);border-radius:8px}
.det-thumb img{width:100%;height:100%;object-fit:cover}
.det-grid{display:grid;grid-template-columns:2fr 1fr;gap:36px}
.det-badges{display:flex;gap:10px;margin-bottom:16px}
.det-badge{padding:5px 14px;border-radius:100px;font-size:11px;font-weight:700}
.det-cat{background:rgba(201,168,76,.12);color:var(--gold)}
.det-sale{background:rgba(201,168,76,.9);color:#000}
.det-inv{background:rgba(30,120,255,.85);color:#fff}
.det-title{font-size:28px;font-weight:700;margin-bottom:16px}
.det-specs-row{display:flex;gap:20px;margin-bottom:24px;padding-bottom:24px;border-bottom:1px solid rgba(255,255,255,.06)}
.det-spec{display:flex;align-items:center;gap:7px;font-size:14px;color:rgba(248,244,238,.55)}
.det-spec strong{color:var(--light)}
.det-desc{font-size:14px;color:rgba(248,244,238,.6);line-height:1.8;margin-bottom:28px}
.det-features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.det-feat{display:flex;align-items:center;gap:9px;font-size:13px;color:rgba(248,244,238,.55)}
.det-feat::before{content:'✓';color:var(--gold)}
.det-price-card{background:var(--dark3);border:1px solid rgba(201,168,76,.18);border-radius:18px;padding:28px;position:sticky;top:80px}
.det-price-main{font-size:36px;font-weight:800;color:var(--gold)}
.btn-g{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000;padding:14px 32px;border-radius:8px;font-size:14px;font-weight:700;border:none;cursor:pointer;display:inline-block;width:100%;text-align:center;margin-bottom:12px}
.btn-o{background:transparent;color:var(--light);padding:14px 32px;border-radius:8px;font-size:14px;border:1px solid rgba(248,244,238,.25);cursor:pointer;display:inline-block;width:100%;text-align:center}
.btn-o:hover{border-color:var(--gold);color:var(--gold)}
.det-contacts{margin-top:22px;padding-top:22px;border-top:1px solid rgba(255,255,255,.06)}
.det-contact-row{display:flex;align-items:center;gap:10px;font-size:13.5px;margin-bottom:10px}
.det-contact-row a{color:var(--light);text-decoration:none}
.det-contact-row a:hover{color:var(--gold)}
.det-contact-icon{width:32px;height:32px;background:rgba(201,168,76,.09);border-radius:7px;display:flex;align-items:center;justify-content:center}

.fltg{position:fixed;bottom:28px;right:28px;display:flex;flex-direction:column;gap:9px}
.fb2{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;text-decoration:none}
.fc{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.fw{background:#25D366;color:#fff}
.ftg{background:#229ED9;color:#fff}

@media(max-width:768px){
  .nav-links{display:none}
  .det-gallery{grid-template-columns:1fr;height:260px}
  .det-thumbs{display:none}
  .det-grid{grid-template-columns:1fr}
  .det-wrap{padding-left:20px;padding-right:20px}
  .det-back{padding-left:20px}
}
</style>
</head>
<body>

<nav class="nav">
  <a class="logo" href="index.html">
    <div class="logo-box">ET</div>
    <div class="logo-text">e<span>turkey</span>.ru</div>
  </a>
  <ul class="nav-links">
    <li><a href="index.html" id="homeLink">Главная</a></li>

    <li><a href="index.html#servicesSection">Услуги</a></li>

<a class="det-back" href="index.html">← Назад к каталогу</a>

<script>

const properties = [
  {id:1,name:"Эксклюзивная вилла 8+2 в Коньяалты",cat:"Дома и виллы",area:"750 м²",rooms:"8+2",district:"Коньяалты",badge:"Продажа",price:"3 250 000 €",desc:"Роскошная вилла с великолепной отделкой в престижном районе Коньяалты. Просторные комнаты, бассейн, ландшафтный сад.",features:["Частный бассейн","Ландшафтный сад","Умный дом","Гараж на 3 авто"],img:"https://www.eturkey.ru/upload/resize_cache/iblock/f54/1000_300_1/photo1658496515%20(1).jpeg"},
  {id:2,name:"Роскошные виллы в Анталье (LOTUS)",cat:"Дома и виллы",area:"183 м²",rooms:"3+1",district:"Коньяалты",badge:"Инвестиции",price:"507 640 €",desc:"Проект LOTUS — современные виллы с биологическим бассейном.",features:["Биологический бассейн","Экологические материалы","Панорамные окна"],img:"https://www.eturkey.ru/upload/resize_cache/iblock/d97/dixct69wmkyodu2eol3cn1solizhvb8c/350_350_1/LOTUS%20ANTALYA0.jpg"},
  {id:3,name:"Люксовые виллы — подходит под гражданство",cat:"Дома и виллы",area:"675 м²",rooms:"5+1",district:"Коньяалты",badge:"Продажа",price:"1 600 000 €",desc:"Элитные виллы, подходящие для оформления гражданства Турции.",features:["Гражданство Турции","Бассейн","Подземный гараж","Умный дом"],img:"https://www.eturkey.ru/upload/resize_cache/iblock/58e/8mb48duu9jervwmzur7u29srd19zynce/350_350_1/WhatsApp%20Image%202023-04-28%20at%2014.39.11%20(2).jpeg"},
  {id:4,name:"Супер люксовые виллы в Дёшемеалты",cat:"Дома и виллы",area:"300 м²",rooms:"4+1",district:"Дёшемеалты",badge:"Продажа",price:"1 635 000 €",desc:"Эксклюзивные виллы в зелёном горном районе.",features:["Горный воздух","Бассейн","Барбекю","Гараж"],img:"https://www.eturkey.ru/upload/resize_cache/iblock/429/350_350_1/Screenshot_4.jpg"},
  {id:5,name:"Жилой комплекс 3+1 в Анталье, Хурма",cat:"Квартиры",area:"90 м²",rooms:"3+1",district:"Хурма",badge:"Продажа",price:"220 000 €",desc:"Современный жилой комплекс в районе Хурма.",features:["Балкон","Парковка","Бассейн","Лифт"],img:"https://www.eturkey.ru/upload/resize_cache/iblock/e57/ux71i8jz0x0b1ze622ab4px4vuywmk3e/350_350_1/8.jpg"},
  {id:6,name:"Квартиры с видом в Аланье",cat:"Квартиры",area:"69 м²",rooms:"1+1",district:"Аланья",badge:"Продажа",price:"270 000 €",desc:"Роскошный комплекс с панорамным видом на море.",features:["Вид на море","СПА","Ресторан","Бассейн"],img:"https://www.eturkey.ru/upload/resize_cache/iblock/c35/icimterzom2eldwifx1r6vrps6r80xyk/350_350_1/bg-home1-01-1-1.jpg"},

  {id:8,name:"Высококлассные апартаменты",cat:"Коммерческая",area:"60 м²",rooms:"1+1",district:"Аланья",badge:"Продажа",price:"7 000 000 €",desc:"Коммерческие апартаменты в центре Аланьи.",features:["Высокая доходность","Готовый бизнес"],img:"https://www.eturkey.ru/upload/resize_cache/iblock/fb0/350_350_1/vysokoklassnye-kvartiry-1-1-s-otlichnoy-planirovkoy.jpg"}

function getPropertyId() {
  const params = new URLSearchParams(window.location.search);
  return parseInt(params.get('id'));
}

function loadProperty() {
  const id = getPropertyId();
  const prop = properties.find(p => p.id === id);
  
  if (!prop) {
    document.getElementById('det-content').innerHTML = `<div style="text-align:center;padding:80px"><h2>Объект не найден</h2><a href="index.html" class="btn-g" style="display:inline-block;width:auto;margin-top:20px">← На главную</a></div>`;
    return;
  }

  const badgeClass = prop.badge === 'Продажа' ? 'det-sale' : 'det-inv';
  
  document.getElementById('det-content').innerHTML = `
    <div class="det-gallery">
      <div class="det-main-img"><img src="${prop.img}" alt="${prop.name}" onerror="this.parentNode.innerHTML='<div style=height:100%;display:flex;align-items:center;justify-content:center;font-size:64px>🏠</div>'"></div>
      <div class="det-thumbs"><div class="det-thumb"><img src="${prop.img}" alt=""></div><div class="det-thumb" style="display:flex;align-items:center;justify-content:center;font-size:40px">📸</div></div>
    </div>
    <div class="det-grid">
      <div>
        <div class="det-badges"><span class="det-badge det-cat">${prop.cat}</span><span class="det-badge ${badgeClass}">${prop.badge}</span></div>
        <div class="det-title">${prop.name}</div>
        <div class="det-specs-row"><div class="det-spec">📐 <strong>${prop.area}</strong></div><div class="det-spec">🛏 <strong>${prop.rooms}</strong></div><div class="det-spec">📍 <strong>${prop.district}</strong></div></div>
        <div class="det-desc">${prop.desc}</div>
        <div style="font-weight:600;color:var(--gold);margin-bottom:14px">Особенности:</div>
        <div class="det-features">${prop.features.map(f => `<div class="det-feat">${f}</div>`).join('')}</div>
      </div>
      <div>
        <div class="det-price-card">
          <div class="det-price-main">${prop.price}</div>
          <button class="btn-g" onclick="alert('Заявка отправлена!')">📩 Оставить заявку</button>
          <button class="btn-o" onclick="window.location.href='index.html'">← Вернуться</button>
          <div class="det-contacts">
            <div class="det-contact-row"><div class="det-contact-icon">📞</div><a href="tel:+905427724868">+90 (542) 772-48-68</a></div>
            <div class="det-contact-row"><div class="det-contact-icon">💬</div><a href="whatsapp://send?phone=+905427724868">WhatsApp</a></div>
            <div class="det-contact-row"><div class="det-contact-icon">✈</div><a href="tg://resolve?domain=eturkey">Telegram</a></div>
          </div>
        </div>
      </div>
    </div>
  `;
  document.title = `${prop.name} — eturkey.ru`;
}

loadProperty();

// ========== ПЛАВНЫЙ СКРОЛЛ ДЛЯ НАВИГАЦИИ ==========
function smoothScrollToElement(element) {
    if (element) element.scrollIntoView({ behavior: 'smooth', block: 'start' });
}
function setupSmoothNavigation() {
    const navLinks = document.querySelectorAll('.nav-links a');
    const consultBtn = document.getElementById('consultBtn');
    function handleNavClick(e) {
        const link = e.currentTarget;
        const href = link.getAttribute('href');
        if (!href) return;
        if (href.startsWith('#')) {
            e.preventDefault();
            const targetId = href.substring(1);
            const targetElement = document.getElementById(targetId);
            if (targetElement) {
                smoothScrollToElement(targetElement);
                history.pushState(null, null, href);
            }
        } else if (href === 'index.html' || href === '/' || href === '.') {
            const isCurrentPage = window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname === '';
            if (isCurrentPage) {
                e.preventDefault();
                window.scrollTo({ top: 0, behavior: 'smooth' });
                history.pushState(null, null, 'index.html');
            }
        }
    }
    navLinks.forEach(link => link.addEventListener('click', handleNavClick));
    if (consultBtn) {
        consultBtn.addEventListener('click', (e) => {
            const isCurrentPage = window.location.pathname.endsWith('index.html') || window.location.pathname === '/' || window.location.pathname === '';
            if (isCurrentPage) {
                e.preventDefault();
                const contactSection = document.getElementById('contactSection');
                if (contactSection) {
                    smoothScrollToElement(contactSection);
                    history.pushState(null, null, '#contactSection');
                }
            } else {
                window.location.href = 'index.html#contactSection';
            }
        });
    }
}
document.addEventListener('DOMContentLoaded', setupSmoothNavigation);
</script>
